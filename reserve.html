<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Donation - LifeLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-[#3D2B2B] font-sans selection:bg-[#f3a4a3] relative bg-[#F9F7F2]">

    <main class="relative z-10 flex flex-col items-center px-6 pt-20 pb-32">
        <header class="text-center max-w-xl mb-12">
            <h1 class="text-4xl md:text-5xl font-serif mb-4">Save a Life. <br>Schedule a Donation.</h1>
            <p class="text-sm opacity-70">Choose a hospital and a time that works for you. We'll handle the rest.</p>
        </header>

        <form class="w-full max-w-lg space-y-8 bg-white/30 p-8 rounded-3xl backdrop-blur-sm border border-[#3D2B2B]/5 shadow-xl">
            
            <div>
                <label class="block text-[10px] uppercase tracking-[0.3em] font-black mb-3 opacity-80">Select Hospital Bank</label>
                <select class="w-full bg-transparent border-b-2 border-[#3D2B2B]/10 focus:border-[#3D2B2B] outline-none py-3 text-lg cursor-pointer appearance-none">
                    <option>Dhaka Medical College Hospital</option>
                    <option>Evercare Hospital Dhaka</option>
                    <option>Square Hospital</option>
                    <option>United Hospital</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-[10px] uppercase tracking-[0.3em] font-black mb-3 opacity-80">Preferred Date</label>
                    <input type="date" class="w-full bg-transparent border-b-2 border-[#3D2B2B]/10 focus:border-[#3D2B2B] outline-none py-3 text-lg">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-[0.3em] font-black mb-3 opacity-80">Preferred Time</label>
                    <input type="time" class="w-full bg-transparent border-b-2 border-[#3D2B2B]/10 focus:border-[#3D2B2B] outline-none py-3 text-lg">
                </div>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-[0.3em] font-black mb-3 opacity-80">Your Blood Group</label>
                <select class="w-full bg-transparent border-b-2 border-[#3D2B2B]/10 focus:border-[#3D2B2B] outline-none py-3 text-lg">
                    <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                    <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                </select>
            </div>

            <div class="pt-6 text-center">
                <button type="submit" class="w-full py-5 bg-[#3D2B2B] text-white text-[11px] font-bold uppercase tracking-[0.4em] hover:bg-[#FF6B6B] transition-all shadow-lg">
                    Confirm Reservation
                </button>
            </div>
        </form>
    </main>
</body>
</html>
