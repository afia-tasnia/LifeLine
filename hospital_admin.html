<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Dashboard - LifeLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F9F7F2] text-[#3D2B2B] p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-[10px] uppercase tracking-[0.4em] font-bold opacity-50">Hospital Portal</h2>
                <h1 class="text-4xl font-serif">Donation Schedule</h1>
            </div>
            <div class="text-right">
                <span class="text-2xl font-serif text-[#FF6B6B]">12</span>
                <p class="text-[9px] uppercase tracking-widest font-bold opacity-60">Reservations Today</p>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-[#3D2B2B]/5">
            <table class="w-full text-left">
                <thead class="bg-[#3D2B2B] text-white text-[10px] uppercase tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Donor Name</th>
                        <th class="px-6 py-4">Blood Group</th>
                        <th class="px-6 py-4">Appointment</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-[#3D2B2B]/5">
                    <tr class="hover:bg-[#f3a4a3]/10 transition-colors">
                        <td class="px-6 py-6 font-bold">Adnan Chowdhury</td>
                        <td class="px-6 py-6 text-[#FF6B6B] font-black">O+</td>
                        <td class="px-6 py-6 text-sm">Today, 2:30 PM</td>
                        <td class="px-6 py-6"><span class="px-3 py-1 bg-yellow-100 text-yellow-700 text-[10px] rounded-full font-bold uppercase">Pending</span></td>
                        <td class="px-6 py-6"><button class="text-[10px] font-bold uppercase underline hover:text-[#FF6B6B]">Check In</button></td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
