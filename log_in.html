<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/log_in.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F9F7F2]">

    <section class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-4xl w-full bg-white border border-[#E8E2D9] flex flex-col md:flex-row overflow-hidden shadow-2xl form-container">
            
            <div class="md:w-1/2 bg-[#E5C7CE] p-12 text-[#4B5563] flex flex-col justify-between relative">
    <div class="relative z-10">
        <a href="home.html" class="text-xs font-bold tracking-[0.4em] uppercase opacity-60 hover:opacity-100 transition-opacity mb-12 block">← Back to Home</a>
        
        <div class="flex items-center gap-0">
                
                <span class="text-2xl md:text-3xl font-serif font-semibold tracking-tighter text-[#3D2B2B]">
                    Life<span class="text-rose-italic">Line</span>
                </span>
            </div>
        <p class="text-sm opacity-70 leading-relaxed font-light mb-12">
            Log in to manage your requests or coordinate life-saving transfers within your community.
        </p>

        <div class="flex justify-center items-center">
            <img 
                src="resources/login_graphic.svg" 
                alt="Medical Illustration" 
                class="w-full max-w-[320px] h-auto object-contain transition-transform duration-500 hover:scale-105"
            />
        </div>
    </div>
    
    <div class="pt-10  relative z-10">
        <p class="text-[10px] uppercase tracking-[0.2em] opacity-100 mb-4">Need an account?</p>
        <a href="sign_up.html" class="inline-block w-full text-center py-4 border border-[#4B5563] text-[#4B5563] text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-white hover:text-[#3D2B2B] transition-all duration-300">
            Sign Up Here
        </a>
    </div>

    <div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-[#8E4444]/15 rounded-full blur-3xl"></div>
</div>

            <div class="md:w-1/2 p-12 lg:p-16">
                <h3 class="text-2xl font-serif text-[#3D2B2B] mb-8">Sign In</h3>
                
                <form action="#" class="space-y-8">
                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Email Address</label>
                        <input type="email" class="form-input w-full py-3 text-sm" placeholder="email@example.com">
                    </div>
                    
                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Password</label>
                        <input type="password" class="form-input w-full py-3 text-sm" placeholder="••••••••">
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="custom-checkbox">
                            <span class="text-[10px] uppercase tracking-widest text-[#3D2B2B]/60 font-bold">Remember me</span>
                        </label>
                        <a href="#" class="text-[10px] uppercase tracking-widest text-[#3D2B2B]/40 hover:text-[#8E4444] font-bold">Forgot?</a>
                    </div>

                    <button type="submit" class="w-full py-4 bg-[#E5C7CE] text-[#4B5563] text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-[#8E4444] hover:text-white transition-all duration-300 shadow-xl active:scale-[0.98]">
                        Login
                    </button>
                </form>

                <div class="mt-12 pt-8 border-t border-[#E8E2D9] text-center">
                    <p class="text-[11px] text-[#3D2B2B]/60 italic mb-5">Are you ready to be someone's hero?</p>
                    <a href="donor_registration.html" class="btn-hero-outline inline-block px-8 py-3 text-[9px] font-bold uppercase tracking-widest rounded-sm">
                        Register as a Donor
                    </a>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
