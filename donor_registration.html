<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Registration | LifeLine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F9F7F2]">

    <section class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-5xl w-full bg-white border border-[#E8E2D9] flex flex-col md:flex-row overflow-hidden shadow-2xl form-container">

            <div class="md:w-1/3 bg-[#a7d7ec] p-10 text-white flex flex-col justify-between relative overflow-hidden">
                
                <div class="absolute inset-0 z-0">
                    <div class="absolute inset-0 bg-[#89b8cc]/60 z-10"></div>
                    
                    <video autoplay muted loop playsinline 
                        class="absolute inset-0 w-full h-full object-cover transform scale-125" 
                        style="object-position: 50% 50%;">
                        <source src="resources/donor_reg_video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>

                <div class="relative z-10">
                    <a href="home.html"
                        class="text-xs font-bold tracking-[0.4em] uppercase opacity-80 hover:opacity-100 transition-opacity mb-12 block">
                        ← Back to Home
                    </a>
                    <h2 class="text-3xl font-serif leading-tight">The Hero's Pledge.</h2>
                    <p class="text-xs opacity-95 leading-relaxed font-light mb-4">
                        By registering as a donor, you agree to be contacted for emergency blood requests matching your type.
                    </p>
                    <ul class="text-[10px] uppercase tracking-widest space-y-4 opacity-90 font-bold">
                        <li class="flex items-center gap-2"><span>✓</span> Real-time Alerts</li>
                        <li class="flex items-center gap-2"><span>✓</span> Donor Recognition</li>
                        <li class="flex items-center gap-2"><span>✓</span> Track Impact</li>
                    </ul>
                </div>

                <div class="relative z-10 text-[10px] opacity-80 uppercase tracking-widest font-bold">
                    LifeLine Verified Donor Program
                </div>
            </div>

            <div class="md:w-2/3 p-10 lg:p-14 bg-white">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-2xl font-serif text-[#3D2B2B]">Donor Application</h3>
                    <span class="text-[9px] font-bold px-3 py-1 bg-[#a7d7ec]/30 text-[#6a97aa] uppercase tracking-widest rounded-full">Phase 01</span>
                </div>

                <form action="#" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Full Name</label>
                        <input type="text" class="form-input w-full py-2 text-sm border-b border-[#E8E2D9] focus:border-[#a7d7ec] outline-none transition-colors">
                    </div>
                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Email</label>
                        <input type="email" class="form-input w-full py-2 text-sm border-b border-[#E8E2D9] focus:border-[#a7d7ec] outline-none transition-colors">
                    </div>

                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Blood Group</label>
                        <select class="form-input w-full py-2 text-sm appearance-none bg-transparent border-b border-[#E8E2D9] focus:border-[#a7d7ec] outline-none">
                            <option>A+</option><option>A-</option>
                            <option>B+</option><option>B-</option>
                            <option>O+</option><option>O-</option>
                            <option>AB+</option><option>AB-</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Last Donation</label>
                        <input type="date" class="form-input w-full py-2 text-sm border-b border-[#E8E2D9] focus:border-[#a7d7ec] outline-none transition-colors">
                    </div>

                    <div class="input-group md:col-span-2">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">Preferred Hospital/Area</label>
                        <input type="text" class="form-input w-full py-2 text-sm border-b border-[#E8E2D9] focus:border-[#a7d7ec] outline-none transition-colors" placeholder="e.g. Dhaka Medical College">
                    </div>

                    <div class="md:col-span-2 pt-4">
                        <label class="flex items-start gap-3 cursor-pointer group">
                            <input type="checkbox" class="mt-1">
                            <span class="text-[10px] text-[#3D2B2B]/60 leading-normal">
                                I confirm that I am over 18, weigh more than 45kg, and am in good health to donate blood.
                            </span>
                        </label>
                    </div>

                    <div class="md:col-span-2 pt-6">
                        <button type="submit" class="w-full py-4 bg-[#a7d7ec] text-[#3D2B2B] text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-[#8ec3d9] transition-all duration-300 shadow-lg">
                            Submit Application
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
