<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | LifeLine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style/log_in.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>

<body class="bg-[#F9F7F2]">

    <section class="min-h-screen flex items-center justify-center py-12 px-4">
        <div
            class="max-w-4xl w-full bg-white border border-[#E8E2D9] flex flex-col md:flex-row overflow-hidden shadow-2xl form-container">

            <div
                class="md:w-1/2 bg-[#3D2B2B] p-12 text-[#F9F7F2] flex flex-col justify-between relative overflow-hidden">

                <div class="absolute inset-0 z-0">
                    <div class="absolute inset-0 bg-[#3D2B2B]/70 z-10"></div>

                    <video autoplay muted loop playsinline 
    class="absolute inset-0 w-full h-full object-cover transform scale-125" 
    style="object-position: 46% 50%;">
    <source src="resource/sign_up_video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>
                </div>

                <div class="relative z-10">
                    <a href="home.html"
                        class="text-xs font-bold tracking-[0.4em] uppercase opacity-80 hover:opacity-100 transition-opacity mb-12 block">
                        ← Back to Home
                    </a>

                    <div class="flex items-center gap-0">
                        <span class="text-2xl md:text-3xl font-serif font-semibold tracking-tighter text-white">
                            Life<span class="text-rose-italic" style="color: #E5C7CE;">Line</span>
                        </span>
                    </div>
                    <p class="text-sm opacity-70 leading-relaxed font-light mb-8">
                        Creating an account allows you to request blood in emergencies and track local donor
                        availability.
                    </p>
                </div>

                <div class="relative z-10 pt-10">
                    <p class="text-[10px] uppercase tracking-[0.2em] opacity-80 mb-4">Already a member?</p>
                    <a href="log_in.html"
                        class="inline-block w-full text-center py-4 border border-white/20 text-white text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-white hover:text-[#3D2B2B] transition-all duration-300">
                        Log In Instead
                    </a>
                </div>
            </div>

            <div class="md:w-1/2 p-12 lg:p-16 bg-white">
                <h3 class="text-2xl font-serif text-[#3D2B2B] mb-8">Create Account</h3>

                <form action="#" class="space-y-6">
                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">
                            Full Name
                        </label>
                        <input type="text"
                            class="form-input w-full py-3 text-sm border-b border-[#E8E2D9] focus:outline-none focus:border-[#3D2B2B] transition-colors"
                            placeholder="John Doe">
                    </div>

                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">
                            Email Address
                        </label>
                        <input type="email"
                            class="form-input w-full py-3 text-sm border-b border-[#E8E2D9] focus:outline-none focus:border-[#3D2B2B] transition-colors"
                            placeholder="email@example.com">
                    </div>

                    <div class="input-group">
                        <label class="block text-[10px] uppercase tracking-widest text-[#3D2B2B]/50 mb-2 font-bold">
                            Password
                        </label>
                        <input type="password"
                            class="form-input w-full py-3 text-sm border-b border-[#E8E2D9] focus:outline-none focus:border-[#3D2B2B] transition-colors"
                            placeholder="••••••••">
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="w-full py-4 bg-[#3D2B2B] text-white text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-[#8E4444] transition-all duration-300 shadow-xl">
                            Register
                        </button>
                    </div>
                </form>

                <div class="mt-10 pt-8 border-t border-[#E8E2D9] text-center">
                    <p class="text-[11px] text-[#3D2B2B]/60 italic mb-5">Are you here to save lives?</p>
                    <a href="donor_registration.html" class="btn-hero-outline inline-block px-8 py-3 text-[9px] font-bold uppercase tracking-widest rounded-sm">
                        Register as a Donor
                    </a>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
